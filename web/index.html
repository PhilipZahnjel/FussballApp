<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <!-- Content Security Policy: schützt vor XSS-Angriffen -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval';
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: https: blob:;
        connect-src 'self' https://*.supabase.co wss://*.supabase.co https://gajwglshmkcoznhqvvpg.supabase.co;
        font-src 'self' data:;
        frame-src 'none';
        object-src 'none';
        base-uri 'self';
        form-action 'self';
      "
    />

    <!-- Verhindert Clickjacking -->
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <!-- Verhindert MIME-Sniffing -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <!-- Kein Referrer an externe Seiten -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <title>PK-Fußballschule</title>

    <!-- Favicon & Icons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme & PWA Meta -->
    <meta name="theme-color" content="#5A8C6A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PK-Fußball" />

    <!-- PWA Install UI -->
    <style>
      #pwa-install-btn {
        display: none;
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        background: #5A8C6A;
        color: #fff;
        border: none;
        border-radius: 14px;
        padding: 14px 28px;
        font-size: 15px;
        font-weight: 700;
        font-family: -apple-system, sans-serif;
        cursor: pointer;
        box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      }
      #pwa-ios-hint {
        display: none;
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        background: #1e3a2f;
        color: #fff;
        border-radius: 14px;
        padding: 14px 20px;
        font-size: 13px;
        font-family: -apple-system, sans-serif;
        text-align: center;
        white-space: nowrap;
        box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      }
    </style>

    <%- htmlWebpackPlugin?.options?.headTags ?? '' %>
  </head>
  <body>
    <noscript>Diese App benötigt JavaScript.</noscript>
    <div id="root"></div>

    <!-- Install-Button (Android / Desktop Chrome) -->
    <button id="pwa-install-btn">⚽ App installieren</button>

    <!-- iOS-Hinweis -->
    <div id="pwa-ios-hint">Tippe auf Teilen ↑ → „Zum Home-Bildschirm"</div>

    <script>
      // Service Worker registrieren
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js');
        });
      }

      // Android/Desktop: Install-Button
      let deferredPrompt;
      const installBtn = document.getElementById('pwa-install-btn');
      window.addEventListener('beforeinstallprompt', e => {
        e.preventDefault();
        deferredPrompt = e;
        installBtn.style.display = 'block';
      });
      installBtn.addEventListener('click', () => {
        installBtn.style.display = 'none';
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
      });
      window.addEventListener('appinstalled', () => {
        installBtn.style.display = 'none';
      });

      // iOS: Hinweis nur wenn nicht bereits als App geöffnet
      const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
      const isStandalone = window.navigator.standalone === true;
      if (isIos && !isStandalone) {
        document.getElementById('pwa-ios-hint').style.display = 'block';
      }
    </script>

    <%- htmlWebpackPlugin?.options?.bodyTags ?? '' %>
  </body>
</html>
