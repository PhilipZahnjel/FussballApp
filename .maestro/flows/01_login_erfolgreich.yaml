appId: host.exp.exponent
name: "Login – Erfolgreicher Login"
---
- launchApp:
    clearState: true

- assertVisible: "PK-Fußballschule"
- assertVisible: "Willkommen zurück"
- assertVisible: "Hattersheim am Main"

- tapOn: "E-Mail-Adresse"
- inputText: "philip@gmail.com"
- tapOn: "Passwort"
- inputText: "123456"
- tapOn: "Anmelden"
- waitForAnimationToEnd

- assertVisible: "Home"
- assertVisible: "Termine"
- assertVisible: "Nachholtermin"
- assertVisible: "Infos"
- assertVisible: "Profil"
